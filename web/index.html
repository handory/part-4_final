<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DB Table Viewer</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 40px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
      th { background: #f4f4f4; }
      #status { color: #555; margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <h1>데이터베이스 테이블 보기</h1>
    <div id="status">로딩 중...</div>
    <table>
      <thead>
        <tr><th>ID</th><th>Name</th><th>Created At</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <script>
      async function loadRows() {
        try {
          const res = await fetch('/api/rows');
          const data = await res.json();
          const tbody = document.getElementById('rows');
          tbody.innerHTML = '';
          for (const row of data.rows) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row.id}</td><td>${row.name}</td><td>${row.created_at}</td>`;
            tbody.appendChild(tr);
          }
          document.getElementById('status').textContent = '완료';
        } catch (err) {
          document.getElementById('status').textContent = '로드 실패';
        }
      }
      loadRows();
    </script>
  </body>
</html>
